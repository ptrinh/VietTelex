<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Baloo 2',system-ui,sans-serif}
a{color:#2c7a4b}a:hover{color:#1d5c37}
@keyframes driftLeft{from{transform:translateX(0)}to{transform:translateX(-135vw)}}
@keyframes cloudPop{0%{transform:scale(1);opacity:1}100%{transform:scale(1.9);opacity:0}}
@keyframes bgDrift{from{transform:translateX(20vw)}to{transform:translateX(-150vw)}}
@keyframes sway{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-10px)}}
@keyframes tailWag{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(12deg)}}
@keyframes graze{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
@keyframes flap{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.5)}}
@keyframes flockFly{from{transform:translateX(-20vw)}to{transform:translateX(118vw)}}
@keyframes gustLeft{0%{opacity:0;transform:translateX(10px)}25%{opacity:1}100%{opacity:0;transform:translateX(-140px)}}
@keyframes legSwing{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(9deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.85}}
@keyframes headSway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes buffHead{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(3deg)}}
@keyframes tailSwing{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(12deg)}}
@keyframes sunGlow{0%,100%{box-shadow:0 0 50px 18px rgba(255,214,90,.55)}50%{box-shadow:0 0 70px 30px rgba(255,214,90,.75)}}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fwRise{from{transform:translateY(0);opacity:1}to{transform:translateY(-46vh);opacity:1}}
@keyframes fwSpark{0%{transform:translate(0,0) scale(1);opacity:1}70%{opacity:.95}100%{transform:translate(var(--dx),var(--dy)) scale(.35);opacity:0}}
@keyframes blinkCursor{50%{opacity:.15}}
.bgcloud{position:absolute;background:#fff;border-radius:40px;z-index:3}
.bgcloud i{position:absolute;background:#fff;border-radius:50%}
.cloud{display:flex;align-items:center;gap:9px;padding:13px 26px;background:#fff;border-radius:46px;
  box-shadow:0 8px 22px rgba(80,130,190,.28);position:absolute;left:100%;z-index:6}
.cloud .puff{position:absolute;background:#fff;border-radius:50%}
.cloud.shake{animation-name:driftLeft,shake!important;animation-duration:var(--dur),.18s!important;
  animation-timing-function:linear,ease!important;animation-fill-mode:forwards,none!important}
.word{font-size:27px;font-weight:700;color:#41648a;position:relative;z-index:1;padding-bottom:1px;
  border-bottom:4px solid transparent;white-space:nowrap}
.cloud.active .word{border-bottom-color:#ff8a4c}
.cloud.active{background:linear-gradient(180deg,#fffdf2,#ffe9a3);box-shadow:0 0 0 3px rgba(255,214,90,.55),0 10px 30px rgba(255,190,60,.45)}
.cloud.active .puff{background:linear-gradient(180deg,#fffdf4,#ffedb0)}
.cloud.active::after{content:'☀️';position:absolute;top:-42px;right:-14px;font-size:26px;filter:drop-shadow(0 0 8px rgba(255,214,90,.9))}
.word .done{color:#1f9d63}
.word .mid{color:#e8890c}
.word .nx{display:inline-block;box-shadow:0 5px 0 #111;animation:blinkCursor 1s steps(1) infinite}
.word .nx.pad{width:.55em}
.word .todo{color:#a5b6c8}
.hudpill{font-size:16px;font-weight:800;padding:5px 14px;border-radius:12px;white-space:nowrap}
button{font-family:inherit}
#stage.paused .cloud,#stage.paused #flocks>div,#stage.paused .bgcloud{animation-play-state:paused!important}
</style>
</head>

<script>

// ── Progress store (shared with the classroom: vtlearn) ─────────────────────

var sBuzz  = function () { tone(150, 0.14, 'square', 0.05); };

var sDrop  = function () { tone(420, 0.3, 'sine', 0.05, 0, 200); };
var sCrash = function () { tone(600, 0.7, 'sawtooth', 0.07, 0, 60); noise(0.5, 0.16, 0.25); tone(70, 0.4, 'sine', 0.12, 0.3); };
var sFire  = function () { for (var i = 0; i < 3; i++) { tone(300 + i * 180, 0.5, 'sine', 0.06, i * 0.18, 900 + i * 200); noise(0.3, 0.1, i * 0.18 + 0.1); } };

// ── Nhạc nền (WebAudio sequencer, không cần file) ───────────────────────────
var musicOn = store.kiteMusic !== false;
var musicVol = (store.kiteMusicVol != null ? store.kiteMusicVol : 30) / 100;
var mGain = null, mTimer = null, mStep = 0, mNext = 0;

var MELODY = [72, 76, 79, 76, 81, 79, 76, 74, 72, 76, 79, 84, 81, 79, 76, 0,
              74, 77, 81, 77, 84, 81, 77, 76, 72, 76, 79, 76, 74, 72, 67, 0];
var BASS   = [48, 0, 55, 0, 45, 0, 52, 0, 50, 0, 57, 0, 43, 0, 55, 0,

function ensureMusicGain() {
  var c = ac();
  if (!mGain) { mGain = c.createGain(); mGain.connect(c.destination); }
  mGain.gain.value = musicOn && !paused && !over ? musicVol : 0;
}
function scheduleNote(freq, t, dur, type, gain) {
  var c = ac(), o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;

  o.connect(g); g.connect(mGain);
  o.start(t); o.stop(t + dur + 0.02);
}
var musicHint = null;
function showMusicHint() {
  if (musicHint || !musicOn) return;
  musicHint = document.createElement('div');
  musicHint.textContent = gt('musicHint');
  musicHint.style.cssText = 'position:fixed;top:118px;right:16px;z-index:8;background:#17233d;color:#fff;padding:8px 14px;border-radius:12px;font-weight:700;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.25);animation:pulse 1.4s ease-in-out infinite';
  document.body.appendChild(musicHint);
}
function hideMusicHint() { if (musicHint) { musicHint.remove(); musicHint = null; } }
function tryResume(c) {
  try { var p = c.resume(); if (p && p.catch) p.catch(function () {}); } catch (e) {}
}
function musicTick() {
  var c = ac();
  // Safari giữ context ở 'suspended'/'interrupted' lâu hơn Chrome — thử
  // resume mỗi tick và đừng dồn nốt vào lúc đồng hồ đứng yên. Chặn mãi
  // (refresh xong chưa có gesture) thì chỉ hint "chạm để bật nhạc".
  if (c.state !== 'running') { tryResume(c); showMusicHint(); return; }
  hideMusicHint();
  ensureMusicGain();
  if (mNext < c.currentTime) mNext = c.currentTime + 0.05;
  while (mNext < c.currentTime + 0.35) {
    var i = mStep % MELODY.length;
    if (MELODY[i]) scheduleNote(nf(MELODY[i]), mNext, STEP * 1.7, 'triangle', 0.32);
    if (BASS[i])   scheduleNote(nf(BASS[i]),   mNext, STEP * 1.9, 'sine', 0.5);
    if (i % 4 === 2) scheduleNote(nf(99), mNext, 0.03, 'square', 0.04);  // hat nhẹ

    mStep++;

function startMusic() {
  if (mTimer) return;
  try {
    var c = ac();
    if (c.state !== 'running') tryResume(c);
    ensureMusicGain();
    mNext = c.currentTime + 0.05;
    mTimer = setInterval(musicTick, 150);
  } catch (e) {}
}

  document.getElementById('musicBtn').textContent = musicOn ? '🎵' : '🔕';
  document.getElementById('musicVol').value = Math.round(musicVol * 100);
  if (mGain) ensureMusicGain();
}
document.getElementById('musicBtn').addEventListener('click', function () {
  musicOn = !musicOn;
  store.kiteMusic = musicOn; saveStore(store);
  if (musicOn) startMusic(); else hideMusicHint();
  renderMusicUI();
});
document.getElementById('musicVol').addEventListener('input', function () {

// không nhận keydown là gesture — nên giữ listener đến khi context chạy hẳn.
function unlockAudio() {

var kite = 30, kiteTarget = 30, score = 0, timeLeft = 60, over = false;
var correctKeys = 0, wrongKeys = 0, startedAt = 0;

var spawnT, timerT, flockT, wpmT;
var paused = false, pausedAt = 0;
function setPaused(on) {
  if (over || paused === on) return;

  document.getElementById('stage').classList.toggle('paused', on);
  document.getElementById('pauseOverlay').style.display = on ? 'flex' : 'none';
  document.getElementById('pauseBtn').textContent = on ? '▶' : '⏸';

    '<span class="puff" style="top:-13px;right:12px;width:42px;height:42px"></span>' +

// ── Đọc từ bằng speechSynthesis của browser ────────────────────────────────
var voiceOn = store.kiteVoice !== false;      // default BẬT
// PIN giọng NỮ tiếng Việt. getVoices() trả rỗng lúc mới load (voices nạp
// async) — nếu đọc ngay khi chưa có giọng vi, browser rơi về giọng mặc định
// (nam, đọc kiểu tiếng Anh). Vì vậy: chưa có giọng vi thì XẾP HÀNG chờ
// voiceschanged, tuyệt đối không đọc bằng giọng sai.
var viVoice = null, pendingSpeak = null;
function pickVoice() {
  var vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  var vi = vs.filter(function (v) { return v.lang && v.lang.toLowerCase().indexOf('vi') === 0; });
  // ưu tiên giọng nữ quen thuộc (Linh của Apple, HoaiMy, Google vi mặc định là nữ)
  viVoice = vi.filter(function (v) { return /linh|hoaimy|female|n\u1eef/i.test(v.name); })[0] || vi[0] || null;
  if (viVoice && pendingSpeak) { var t = pendingSpeak; pendingSpeak = null; speakWord(t); }
}
if (window.speechSynthesis) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speakWord(text) {
  if (!voiceOn || !window.speechSynthesis) return;
  if (!viVoice) { pickVoice(); }
  if (!viVoice) { pendingSpeak = text; return; }   // chờ giọng vi, không đọc giọng sai
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.voice = viVoice;
  u.lang = 'vi-VN';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}
var lastSpokenId = 0;
function markActive() {
  var a = activeCloud();
  clouds.forEach(function (c) { c.el.classList.toggle('active', a === c); });
  if (a && a.id !== lastSpokenId) { lastSpokenId = a.id; speakWord(a.w.d); }
  if (DEBUG) document.title = 'K s=' + score + ' kite=' + Math.round(kiteTarget) +
    ' wpm=' + document.getElementById('wpm').textContent +
    (a ? ' keys=' + a.w.k + ' comp=' + a.eng.composed : ' keys=-');
}
function removeCloud(c) {
  c.dead = true;
  c.el.remove();
  clouds = clouds.filter(function (x) { return x !== c; });
  markActive();
}
function levelPool() {
  // lv1 ≤2 chữ, lv2 ≤3, lv3 ≤4, lv4 ≤5, lv5+ không giới hạn
  var maxLen = level <= 4 ? level + 1 : Infinity;
  var pool = WORDS.filter(function (w) { return Array.from(w.d).length <= maxLen; });
  return pool.length ? pool : WORDS;
}
// Bag draw: shuffle the level pool and deal without repeats; when the bag
// runs out just reshuffle ("xoay lại") — game state (kite!) is untouched.
var bag = [];
function nextWord() {
  if (!bag.length) {
    bag = levelPool().slice();
    for (var i = bag.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1)), t = bag[i]; bag[i] = bag[j]; bag[j] = t;
    }
  }
  return bag.pop();
}
function spawnCloud() {
  if (over || paused || !WORDS.length) return;
  clouds.push(makeCloud(nextWord()));
  markActive();
}
function popCloud(c) {
  if (c.popped || over) return;
  c.popped = true;
  score++; wordsDone++; wordsTotal++;
  document.getElementById('score').textContent = score;
  var rect = c.el.getBoundingClientRect();
  c.el.style.animation = 'cloudPop .55s ease forwards';
  c.el.style.left = rect.left + 'px';
  c.el.style.top = rect.top + 'px';
  c.el.style.position = 'fixed';
  var gust = document.createElement('span');
  gust.innerHTML = '<span style="position:absolute;left:-16px;top:30%;font-size:34px;animation:gustLeft .65s ease-out forwards;display:inline-block;z-index:2"><span style="display:inline-block;transform:scaleX(-1)">💨</span></span>';
  c.el.appendChild(gust);
  sPop(); sRise();
  moveKite(Math.max(1, (100 - kiteTarget) * 0.1));
  if (kiteTarget >= 90 && !over) { fireworks(); sFire(); }
  setTimeout(function () { removeCloud(c); }, 650);

// ── Kite ────────────────────────────────────────────────────────────────────
function kiteTopPct(k) { return 64 - k * 0.56; }
function layoutKite() {
  var W = window.innerWidth || 1280, H = window.innerHeight || 800;
  var top = kiteTopPct(kite);
  document.getElementById('kite').style.top = top + '%';
  var kx = W * 0.13, ky = H * top / 100 + 86;
  var hx = W * 0.98 - 338, hy = H * 0.92 - 291;
  document.getElementById('string').setAttribute('d',
    'M ' + hx.toFixed(0) + ' ' + hy.toFixed(0) +
    ' Q ' + ((kx + hx) / 2).toFixed(0) + ' ' + (Math.max(ky, hy) + 70).toFixed(0) +
    ' ' + kx.toFixed(0) + ' ' + ky.toFixed(0));
  document.getElementById('pct').textContent = Math.round(kite);
  document.getElementById('bar').style.width = Math.round(kite) + '%';
}
function moveKite(d) {
  if (over) return;
  kiteTarget = Math.max(0, Math.min(100, kiteTarget + d));
  if (kiteTarget >= 100) {
    // Thắng luôn: diều chạm đỉnh trời — full sao, khỏi chờ hết giờ
    kite = kiteTarget;
    layoutKite();
    fireworks(); sFire();
    endGame(false, 3);
    return;
  }
  cancelAnimationFrame(raf);
  var from = kite, to = kiteTarget, t0 = performance.now(), dur = 750;
  function step(t) {
    var p = Math.min(1, (t - t0) / dur), e = 1 - Math.pow(1 - p, 3);
    kite = from + (to - from) * e;
    layoutKite();
    if (p < 1) raf = requestAnimationFrame(step);
    else if (to <= 0) { sCrash(); endGame(true); }
  }
  raf = requestAnimationFrame(step);
}

        for (var i = 0; i < 16; i++) {

          var ang = (i / 16) * Math.PI * 2, r = 60 + Math.random() * 60;
          sp.style.cssText = 'position:absolute;left:' + cx + '%;top:' + cy + '%;width:8px;height:8px;border-radius:50%;background:' +

    wrongKeys++;
    sBuzz();
    c.el.classList.remove('shake'); void c.el.offsetWidth; c.el.classList.add('shake');
    renderWord(c);
    return;
  }
  correctKeys++;
  sTick();
  renderWord(c);
  if (DEBUG) markActive();
  if (comp === c.w.d) popCloud(c);
}
document.addEventListener('keydown', function (e) {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  // ký tự + Backspace của bàn phím ảo đi qua event 'input' của mobInp,
  // đừng xử lý lần hai ở đây (phím điều khiển như Enter/Escape vẫn qua).
  if (mobInp && e.target === mobInp && (e.key.length === 1 || e.key === 'Backspace')) return;
  gameKey(e.key, function () { e.preventDefault(); });
});

// ── Mobile/tablet: input ẩn để bàn phím OS hiện lên ─────────────────────────
var IS_TOUCH = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || 'ontouchstart' in window;
var mobInp = null;
if (IS_TOUCH) {
  mobInp = document.createElement('input');
  mobInp.type = 'text';
  mobInp.id = 'mobKey';
  mobInp.setAttribute('autocapitalize', 'none');
  mobInp.setAttribute('autocorrect', 'off');
  mobInp.setAttribute('autocomplete', 'off');
  mobInp.setAttribute('spellcheck', 'false');
  mobInp.setAttribute('aria-hidden', 'true');
  // 16px để iOS không zoom khi focus; gần như vô hình nhưng vẫn on-screen
  mobInp.style.cssText = 'position:fixed;left:50%;bottom:2px;width:2px;height:2px;font-size:16px;opacity:.01;border:none;padding:0;background:none;z-index:1;caret-color:transparent;outline:none';
  document.body.appendChild(mobInp);
  var mobPrev = '';
  mobInp.addEventListener('input', function () {
    var v = mobInp.value, i = 0;
    while (i < v.length && i < mobPrev.length && v.charAt(i) === mobPrev.charAt(i)) i++;
    for (var r = mobPrev.length; r > i; r--) gameKey('Backspace', noopPrevent);
    for (var a = i; a < v.length; a++) gameKey(v.charAt(a), noopPrevent);
    mobPrev = v;
    if (v.length > 40) { mobInp.value = ''; mobPrev = ''; }
  });
  // đồng bộ: iOS chỉ hiện bàn phím khi focus() chạy NGAY trong gesture
  var mobFocus = function () {
    try { mobInp.focus({ preventScroll: true }); } catch (e) { mobInp.focus(); }
  };
  document.addEventListener('pointerup', function (e) {
    var t = e.target;
    if (t && t.closest && t.closest('button, a, select, input') && t !== mobInp) return;
    mobFocus();
  });
  mobFocus();
  // notice: game thiết kế cho máy tính + bàn phím vật lý
  var nb = document.createElement('div');
  nb.textContent = gt('mobileNotice');
  nb.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);max-width:min(520px,88vw);background:#17233d;color:#fff;padding:12px 18px;border-radius:14px;font-weight:600;font-size:14px;line-height:1.5;z-index:99;box-shadow:0 10px 30px rgba(0,0,0,.25)';
  nb.addEventListener('pointerdown', function () { nb.remove(); });
  document.body.appendChild(nb);
  setTimeout(function () { nb.remove(); }, 12000);
}

// composition = system Vietnamese IME is ON — remind (the game needs raw keys)
var imeWarned = 0;
document.addEventListener('compositionstart', function () {
  if (IS_TOUCH) return;   // bàn phím ảo compose là chuyện thường, đừng cảnh báo
  if (Date.now() - imeWarned < 60000) return;
  imeWarned = Date.now();
  var t = document.createElement('div');
  t.textContent = gt('imeToast');
  t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#17233d;color:#fff;padding:12px 22px;border-radius:12px;font-weight:700;z-index:99';
  document.body.appendChild(t);
  setTimeout(function () { t.remove(); }, 3200);
});

// ── WPM ─────────────────────────────────────────────────────────────────────
function updateWPM() {
  if (!startedAt || paused) return;
  var mins = Math.max((Date.now() - startedAt) / 60000, 1 / 60);
  document.getElementById('wpm').textContent = Math.round(correctKeys / 5 / mins);
}

// ── Level / end ─────────────────────────────────────────────────────────────
var nextUnlocked = false;
function endGame(crashed, forcedStars) {
  if (over) return;
  over = true;
  if (mGain) ensureMusicGain();   // nhạc lặng khi màn kết thúc
  clearInterval(spawnT); clearInterval(timerT); clearInterval(flockT); clearInterval(wpmT);
  // Sao tính theo % từ gõ đúng / tổng số từ đã xuất hiện (không theo độ cao
  // diều); chạm 100% độ cao thì thắng luôn với full sao (forcedStars).
  var pctWords = wordsTotal ? Math.round(wordsDone / wordsTotal * 100) : 0;
  var stars = forcedStars != null ? forcedStars
    : crashed ? 0 : (pctWords > 90 ? 3 : pctWords > 60 ? 2 : pctWords > 30 ? 1 : 0);
  var prevBest = store.kite.best[level] || 0;
  var gained = Math.max(0, stars - prevBest) * 100;         // 100 XP per NEW star
  if (stars > prevBest) store.kite.best[level] = stars;
  if (gained) store.xp = (store.xp || 0) + gained;
  nextUnlocked = stars >= 1;
  if (nextUnlocked && level + 1 > (store.kite.level || 1)) store.kite.level = level + 1;
  saveStore(store);

  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('ovEmoji').textContent = crashed ? '🍂' : (stars > 0 ? '⭐'.repeat(stars) : '🌥️');
  document.getElementById('ovTitle').textContent = crashed
    ? gt('titleCrash', { n: level })
    : (stars > 0 ? gt('titleStars', { n: level, s: stars }) : gt('titleNoStar', { n: level }));
  document.getElementById('ovMsg').textContent = crashed ? gt('msgCrash')
    : forcedStars != null ? gt('msgSky')
    : stars === 3 ? gt('msg3')
    : stars > 0 ? gt('msgSome')
    : gt('msgNone');
  var mins = startedAt ? Math.max((Date.now() - startedAt) / 60000, 1 / 60) : 1;
  var acc = correctKeys + wrongKeys ? Math.round(correctKeys / (correctKeys + wrongKeys) * 100) : 100;
  document.getElementById('ovStats').innerHTML =
    '⭐ ' + gt('statPopped') + ': ' + wordsDone + '/' + wordsTotal + ' (' + pctWords + '%) · ⚡ ' +
    Math.round(correctKeys / 5 / mins) + ' WPM · 🎯 ' + acc + '%' +
    (gained ? '<br>✨ ' + gt('statXp', { x: gained, n: level }) : '');
  document.getElementById('btnNext').style.display = nextUnlocked ? '' : 'none';
  if (!crashed && stars > 0) {
    for (var i = 0; i < stars; i++) sStar(i);
    setTimeout(sFan, stars * 350);
    fireworks();
  }
}
function startLevel(l) {
  // Độ cao khởi đầu = 50% + 10% mỗi sao của LEVEL TRƯỚC (best đã lưu):
  // lv1 = 50%, level sau được thưởng đà theo thành tích màn trước (tối đa 80%).
  var prevStars = (store.kite.best && store.kite.best[l - 1]) || 0;
  var startAlt = 50 + prevStars * 10;
  level = l;
  bag = [];
  document.getElementById('lvlLabel').textContent = gt('levelN', { n: level });
  document.getElementById('lvlBtn').title = gt('pickTitle');
  document.getElementById('overlay').style.display = 'none';
  clouds.forEach(function (c) { c.el.remove(); });
  clouds = [];
  paused = false;
  if (musicOn) startMusic();
  document.getElementById('stage').classList.remove('paused');
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('pauseBtn').textContent = '⏸';
  over = false; score = 0; timeLeft = 60; kite = startAlt; kiteTarget = startAlt;
  if (mGain) ensureMusicGain();
  correctKeys = 0; wrongKeys = 0; startedAt = 0; fireCooldown = false;
  wordsDone = 0; wordsTotal = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('wpm').textContent = '0';
  document.getElementById('time').textContent = '1:00';
  layoutKite();
  clearInterval(spawnT); clearInterval(timerT); clearInterval(flockT); clearInterval(wpmT);
  spawnT = setInterval(spawnCloud, spawnGap() * 1000);
  flockT = setInterval(function () { if (Math.random() < 0.6) spawnFlock(); }, 22000);
  wpmT = setInterval(updateWPM, 1000);
  timerT = setInterval(function () {
    if (over || paused) return;
    timeLeft--;
    document.getElementById('time').textContent = '0:' + String(Math.max(0, timeLeft)).padStart(2, '0');
    if (timeLeft <= 5 && timeLeft > 0) sTick();
    if (timeLeft <= 0) endGame(false);
  }, 1000);
  setTimeout(spawnCloud, 700);
  setTimeout(spawnFlock, 4000);
}
function skipActive() {
  if (over || paused) return;
  var a = activeCloud();
  if (a) { a.skipped = true; sDrop(); markActive(); }
}
document.getElementById('skipBtn').addEventListener('click', function () { skipActive(); });

var pickerEl = document.getElementById('picker');
function openPicker() {
  var maxL = Math.max(level, store.kite.level || 1);
  var grid = document.getElementById('pickerGrid');
  grid.innerHTML = '';
  for (var l = 1; l <= maxL; l++) {
    (function (l) {
      var best = (store.kite.best && store.kite.best[l]) || 0;
      var b = document.createElement('button');
      b.style.cssText = 'font-family:inherit;font-size:17px;font-weight:800;border:none;border-radius:14px;padding:12px 16px;cursor:pointer;min-width:104px;' +
        (l === level ? 'background:linear-gradient(135deg,#ff8a4c,#ff5a5a);color:#fff' : 'background:#efe8fd;color:#7a4fd0');
      var stars = '';
      for (var i = 1; i <= 3; i++) stars += i <= best ? '⭐' : '☆';
      b.innerHTML = gt('levelN', { n: l }) + '<br><span style="font-size:13px">' + stars + '</span>';
      b.addEventListener('click', function () {
        pickerEl.style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        startLevel(l);
      });
      grid.appendChild(b);
    })(l);
  }
  pickerEl.style.display = 'flex';
}
document.getElementById('lvlBtn').addEventListener('click', openPicker);
document.getElementById('btnPick').addEventListener('click', openPicker);
document.getElementById('pickerClose').addEventListener('click', function () { pickerEl.style.display = 'none'; });
document.getElementById('pauseBtn').addEventListener('click', function () { setPaused(!paused); });
document.getElementById('resumeBtn').addEventListener('click', function () { setPaused(false); });
document.getElementById('btnRetry').addEventListener('click', function () { startLevel(level); });
document.getElementById('btnNext').addEventListener('click', function () { startLevel(level + 1); });
document.getElementById('soundBtn').addEventListener('click', function () {
  soundOn = !soundOn;
  this.textContent = soundOn ? '🔊' : '🔇';
});
var voiceBtn = document.getElementById('voiceBtn');
function renderVoiceBtn() {
  voiceBtn.textContent = voiceOn ? '🗣️' : '🤫';
  voiceBtn.style.opacity = voiceOn ? '1' : '.55';
}
renderVoiceBtn();
voiceBtn.addEventListener('click', function () {
  voiceOn = !voiceOn;
  store.kiteVoice = voiceOn;
  saveStore(store);
  renderVoiceBtn();
  if (!voiceOn && window.speechSynthesis) speechSynthesis.cancel();
  else { var a = activeCloud(); if (a) speakWord(a.w.d); }
});
window.addEventListener('resize', layoutKite);

// ── Boot ────────────────────────────────────────────────────────────────────
fetch('lessons.json').then(function (r) { return r.json(); }).then(function (d) {
  WORDS = d.game || [];
  startLevel(level);
}).catch(function () {
  document.getElementById('ovTitle').textContent = gt('loadFail');
  document.getElementById('overlay').style.display = 'flex';
});
})();
</script>
