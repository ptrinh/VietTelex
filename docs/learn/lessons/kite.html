<script>
(function () {
'use strict';

// ── Progress store (shared with the classroom: vtlearn) ─────────────────────
function loadStore() { try { return JSON.parse(localStorage.getItem('vtlearn') || '{}'); } catch (e) { return {}; } }
function saveStore(st) { localStorage.setItem('vtlearn', JSON.stringify(st)); }
var store = loadStore();
if (!store.kite) store.kite = { best: {}, level: 1 };
if (store.xp === undefined) store.xp = 0;
var soundOn = store.sound !== false;

// ── Sounds (WebAudio, no assets) ────────────────────────────────────────────
var actx = null;
function ac() { actx = actx || new (window.AudioContext || window.webkitAudioContext)(); return actx; }
function tone(freq, dur, type, gain, when, glideTo) {
  if (!soundOn) return;
  try {
    var c = ac(), o = c.createOscillator(), g = c.createGain();
    var t = c.currentTime + (when || 0);
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t);
    if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t + dur);
    g.gain.setValueAtTime(gain || 0.07, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  } catch (e) {}
}
function noise(dur, gain, when) {
  if (!soundOn) return;
  try {
    var c = ac(), t = c.currentTime + (when || 0);
    var b = c.createBuffer(1, c.sampleRate * dur, c.sampleRate), d = b.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    var s = c.createBufferSource(), g = c.createGain();
    s.buffer = b; g.gain.value = gain || 0.12;
    s.connect(g); g.connect(c.destination); s.start(t);
  } catch (e) {}
}
// Gió thổi mạnh: filtered noise whose bandpass sweeps upward — feels like a
// gust pushing the kite higher (replaces the old flat hiss).
function wind(dur, gain) {
  if (!soundOn) return;
  try {
    var c = ac(), t = c.currentTime;
    var b = c.createBuffer(1, c.sampleRate * dur, c.sampleRate), d = b.getChannelData(0);
    for (var i = 0; i < d.length; i++) {
      var env = Math.sin(Math.PI * (i / d.length));           // swell in, fade out
      d[i] = (Math.random() * 2 - 1) * env;
    }
    var src = c.createBufferSource(); src.buffer = b;
    var f = c.createBiquadFilter();
    f.type = 'bandpass'; f.Q.value = 1.1;
    f.frequency.setValueAtTime(280, t);
    f.frequency.exponentialRampToValueAtTime(1500, t + dur * 0.8);
    var g = c.createGain(); g.gain.value = gain || 0.5;
    src.connect(f); f.connect(g); g.connect(c.destination);
    src.start(t);
  } catch (e) {}
}
var sTick  = function () { tone(920, 0.05, 'sine', 0.045); };
var sBuzz  = function () { tone(150, 0.14, 'square', 0.05); };
var sPop   = function () { wind(0.55, 0.55); tone(340, 0.4, 'sine', 0.04, 0.05, 760); };
var sRise  = function () { tone(620, 0.18, 'sine', 0.05, 0, 980); };
var sDrop  = function () { tone(420, 0.3, 'sine', 0.05, 0, 200); };
var sCrash = function () { tone(600, 0.7, 'sawtooth', 0.07, 0, 60); noise(0.5, 0.16, 0.25); tone(70, 0.4, 'sine', 0.12, 0.3); };
var sFire  = function () { for (var i = 0; i < 3; i++) { tone(300 + i * 180, 0.5, 'sine', 0.06, i * 0.18, 900 + i * 200); noise(0.3, 0.1, i * 0.18 + 0.1); } };
var sStar  = function (n) { tone(523 * Math.pow(1.26, n), 0.35, 'triangle', 0.1, n * 0.35); };
var sFan   = function () { [523, 659, 784, 1047, 1319].forEach(function (f, i) { tone(f, 0.28, 'triangle', 0.09, i * 0.13); }); };

// ── Game state ──────────────────────────────────────────────────────────────
var WORDS = [];
var level = Math.max(1, store.kite.level || 1);
var kite = 30, kiteTarget = 30, score = 0, timeLeft = 60, over = false;
var correctKeys = 0, wrongKeys = 0, startedAt = 0;
var wordsDone = 0, wordsTotal = 0;
var clouds = [], cid = 0, rowFlip = 0, raf = 0, fireCooldown = false;
var spawnT, timerT, flockT, wpmT;

function speedMul(l) { return 0.50 + 0.20 * (l - 1); }        // lv1=50%, +20%/level
function cloudDur() { return 16 / speedMul(level); }
function spawnGap() { return Math.min(9, Math.max(3, cloudDur() / 6)); }

// ── Cloud DOM ───────────────────────────────────────────────────────────────
var cloudsEl = document.getElementById('clouds');
function foldBase(t) {
  return t.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D');
}
function makeCloud(w) {
  var el = document.createElement('div');
  el.className = 'cloud';
  var dur = cloudDur();
  el.style.setProperty('--dur', dur + 's');
  el.style.top = (rowFlip ? 22 : 6) + '%';
  el.style.animation = 'driftLeft ' + dur + 's linear forwards';
  rowFlip ^= 1;
  el.innerHTML =
    '<span class="puff" style="top:-24px;left:50%;margin-left:-31px;width:62px;height:62px"></span>' +
    '<span class="puff" style="top:-13px;right:12px;width:42px;height:42px"></span>' +
    '<span class="puff" style="top:-13px;left:12px;width:40px;height:40px"></span>' +
    '<span class="puff" style="top:2px;left:-6px;width:30px;height:30px"></span>' +
    '<span class="puff" style="top:2px;right:-6px;width:30px;height:30px"></span>' +
    '<span style="font-size:27px;position:relative;z-index:1">' + w.a + '</span>' +
    '<span class="word"></span>';
  cloudsEl.appendChild(el);
  var c = { id: ++cid, el: el, w: w, eng: new Telex.TelexEngine({ freeMarking: true }), popped: false, skipped: false, dead: false };
  el.addEventListener('animationend', function (e) {
    if (e.animationName !== 'driftLeft') return;
    removeCloud(c);
    if (!c.popped) { wordsTotal++; moveKite(-10); sDrop(); }
  });
  renderWord(c);
  return c;
}
function esc(s) { return String(s).replace(/[&<>]/g, function (ch) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[ch]; }); }
function renderWord(c) {
  // Engine-driven: show what the child has composed so far, char-by-char
  // against the target — green when the char is final, amber while a
  // transform is still pending (mid free-marking states). The black cursor
  // sits UNDER the next character (overlaying the orange active line).
  var comp = Array.from(c.eng.composed);
  var target = Array.from(c.w.d);
  var doneDone = comp.join('') === c.w.d;
  var html = '';
  for (var i = 0; i < Math.max(comp.length, target.length); i++) {
    if (i < comp.length) {
      var cls = (i < target.length && comp[i] === target[i]) ? 'done' : 'mid';
      html += '<span class="' + cls + '">' + esc(comp[i]) + '</span>';
    } else if (i === comp.length && !doneDone) {
      html += '<span class="todo nx">' + esc(target[i]) + '</span>';
    } else {
      html += '<span class="todo">' + esc(target[i]) + '</span>';
    }
  }
  if (!doneDone && comp.length >= target.length) html += '<span class="nx pad">&nbsp;</span>';
  c.el.querySelector('.word').innerHTML = html;
}
function activeCloud() {
  for (var i = 0; i < clouds.length; i++) {
    var c = clouds[i];
    if (!c.dead && !c.popped && !c.skipped) return c;
  }
  return null;
}
var DEBUG = location.hash === '#debug';
function markActive() {
  var a = activeCloud();
  clouds.forEach(function (c) { c.el.classList.toggle('active', a === c); });
  if (DEBUG) document.title = 'K s=' + score + ' kite=' + Math.round(kiteTarget) +
    ' wpm=' + document.getElementById('wpm').textContent +
    (a ? ' keys=' + a.w.k + ' comp=' + a.eng.composed : ' keys=-');
}
function removeCloud(c) {
  c.dead = true;
  c.el.remove();
  clouds = clouds.filter(function (x) { return x !== c; });
  markActive();
}
function levelPool() {
  var maxLen = level === 1 ? 3 : level === 2 ? 4 : Infinity;
  var pool = WORDS.filter(function (w) { return Array.from(w.d).length <= maxLen; });
  return pool.length ? pool : WORDS;
}
function spawnCloud() {
  if (over || !WORDS.length) return;
  var pool = levelPool();
  var w = pool[Math.floor(Math.random() * pool.length)];
  clouds.push(makeCloud(w));
  markActive();
}
function popCloud(c) {
  if (c.popped || over) return;
  c.popped = true;
  score++; wordsDone++; wordsTotal++;
  document.getElementById('score').textContent = score;
  var rect = c.el.getBoundingClientRect();
  c.el.style.animation = 'cloudPop .55s ease forwards';
  c.el.style.left = rect.left + 'px';
  c.el.style.top = rect.top + 'px';
  c.el.style.position = 'fixed';
  var gust = document.createElement('span');
  gust.innerHTML = '<span style="position:absolute;left:-16px;top:30%;font-size:34px;animation:gustLeft .65s ease-out forwards;display:inline-block;z-index:2"><span style="display:inline-block;transform:scaleX(-1)">💨</span></span>';
  c.el.appendChild(gust);
  sPop(); sRise();
  moveKite((100 - kiteTarget) * 0.1);
  setTimeout(function () { removeCloud(c); }, 650);
  markActive();
}

// ── Kite ────────────────────────────────────────────────────────────────────
function kiteTopPct(k) { return 64 - k * 0.56; }
function layoutKite() {
  var W = window.innerWidth || 1280, H = window.innerHeight || 800;
  var top = kiteTopPct(kite);
  document.getElementById('kite').style.top = top + '%';
  var kx = W * 0.13, ky = H * top / 100 + 86;
  var hx = W * 0.98 - 338, hy = H * 0.92 - 291;
  document.getElementById('string').setAttribute('d',
    'M ' + hx.toFixed(0) + ' ' + hy.toFixed(0) +
    ' Q ' + ((kx + hx) / 2).toFixed(0) + ' ' + (Math.max(ky, hy) + 70).toFixed(0) +
    ' ' + kx.toFixed(0) + ' ' + ky.toFixed(0));
  document.getElementById('pct').textContent = Math.round(kite);
  document.getElementById('bar').style.width = Math.round(kite) + '%';
}
function moveKite(d) {
  if (over) return;
  kiteTarget = Math.max(0, Math.min(100, kiteTarget + d));
  if (kiteTarget >= 90 && !fireCooldown) { fireCooldown = true; fireworks(); sFire(); }
  if (kiteTarget < 85) fireCooldown = false;
  cancelAnimationFrame(raf);
  var from = kite, to = kiteTarget, t0 = performance.now(), dur = 750;
  function step(t) {
    var p = Math.min(1, (t - t0) / dur), e = 1 - Math.pow(1 - p, 3);
    kite = from + (to - from) * e;
    layoutKite();
    if (p < 1) raf = requestAnimationFrame(step);
    else if (to <= 0) { sCrash(); endGame(true); }
  }
  raf = requestAnimationFrame(step);
}

// ── Fireworks ───────────────────────────────────────────────────────────────
function fireworks() {
  var box = document.getElementById('fireworks');
  var colors = ['#ff5a5a', '#ffd75e', '#4cb7ff', '#37c07e', '#c86bff'];
  for (var b = 0; b < 3; b++) {
    (function (b) {
      setTimeout(function () {
        var cx = 15 + Math.random() * 60, cy = 20 + Math.random() * 25;
        for (var i = 0; i < 16; i++) {
          var sp = document.createElement('span');
          var ang = (i / 16) * Math.PI * 2, r = 60 + Math.random() * 60;
          sp.style.cssText = 'position:absolute;left:' + cx + '%;top:' + cy + '%;width:8px;height:8px;border-radius:50%;background:' +
            colors[(i + b) % colors.length] + ';--dx:' + Math.cos(ang) * r + 'px;--dy:' + Math.sin(ang) * r +
            'px;animation:fwSpark .9s ease-out forwards';
          box.appendChild(sp);
          (function (n) { setTimeout(function () { n.remove(); }, 1000); })(sp);
        }
      }, b * 220);
    })(b);
  }
}

// ── Flocks ──────────────────────────────────────────────────────────────────
var flockSVG = '<span style="position:absolute;left:0;top:20px;animation:flap 1.5s ease-in-out infinite"><svg width="26" height="12" viewBox="0 0 26 12"><path d="M1 10 Q7 1 13 9 Q19 1 25 10" style="fill:none;stroke:#fff;stroke-width:2.4px;stroke-linecap:round"/></svg></span>' +
  '<span style="position:absolute;left:34px;top:8px;animation:flap 1.5s ease-in-out infinite;animation-delay:.2s"><svg width="26" height="12" viewBox="0 0 26 12"><path d="M1 10 Q7 1 13 9 Q19 1 25 10" style="fill:none;stroke:#fff;stroke-width:2.4px;stroke-linecap:round"/></svg></span>' +
  '<span style="position:absolute;left:70px;top:0;animation:flap 1.5s ease-in-out infinite;animation-delay:.4s"><svg width="28" height="13" viewBox="0 0 26 12"><path d="M1 10 Q7 1 13 9 Q19 1 25 10" style="fill:none;stroke:#fff;stroke-width:2.4px;stroke-linecap:round"/></svg></span>' +
  '<span style="position:absolute;left:106px;top:10px;animation:flap 1.5s ease-in-out infinite;animation-delay:.15s"><svg width="26" height="12" viewBox="0 0 26 12"><path d="M1 10 Q7 1 13 9 Q19 1 25 10" style="fill:none;stroke:#fff;stroke-width:2.4px;stroke-linecap:round"/></svg></span>';
function spawnFlock() {
  if (over) return;
  var f = document.createElement('div');
  f.style.cssText = 'position:absolute;left:0;top:' + (4 + Math.random() * 13) + '%;width:170px;height:40px;z-index:2;pointer-events:none;animation:flockFly ' + (40 + Math.random() * 20) + 's linear forwards';
  f.innerHTML = flockSVG;
  f.addEventListener('animationend', function () { f.remove(); });
  document.getElementById('flocks').appendChild(f);
}

// ── Typing ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function (e) {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (over) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); document.getElementById(nextUnlocked ? 'btnNext' : 'btnRetry').click(); }
    return;
  }
  if (e.key === ' ') {                       // Space = skip the active cloud
    e.preventDefault();
    var a = activeCloud();
    if (a) { a.skipped = true; markActive(); }
    return;
  }
  var c = activeCloud();
  if (!c) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    c.eng.backspace();
    renderWord(c);
    return;
  }
  if (e.key.length !== 1 || !/[a-zA-Z]/.test(e.key)) return;
  e.preventDefault();
  if (!startedAt) startedAt = Date.now();
  c.eng.feed(e.key);
  var comp = c.eng.composed;
  // BASE-letter prefix check (diacritics may arrive late in free order):
  // a key whose folded result diverges from the target's folded prefix is
  // wrong — buzz and bounce it off so the state stays clean.
  var fb = foldBase(comp), ft = foldBase(c.w.d);
  if (ft.slice(0, fb.length) !== fb || fb.length > ft.length) {
    c.eng.backspace();
    wrongKeys++;
    sBuzz();
    c.el.classList.remove('shake'); void c.el.offsetWidth; c.el.classList.add('shake');
    renderWord(c);
    return;
  }
  correctKeys++;
  sTick();
  renderWord(c);
  if (DEBUG) markActive();
  if (comp === c.w.d) popCloud(c);
});
// composition = system Vietnamese IME is ON — remind (the game needs raw keys)
var imeWarned = 0;
document.addEventListener('compositionstart', function () {
  if (Date.now() - imeWarned < 60000) return;
  imeWarned = Date.now();
  var t = document.createElement('div');
  t.textContent = '⚠️ Tắt bộ gõ tiếng Việt của máy (chuyển sang ABC) để chơi nhé!';
  t.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#17233d;color:#fff;padding:12px 22px;border-radius:12px;font-weight:700;z-index:99';
  document.body.appendChild(t);
  setTimeout(function () { t.remove(); }, 3200);
});

// ── WPM ─────────────────────────────────────────────────────────────────────
function updateWPM() {
  if (!startedAt) return;
  var mins = Math.max((Date.now() - startedAt) / 60000, 1 / 60);
  document.getElementById('wpm').textContent = Math.round(correctKeys / 5 / mins);
}

// ── Level / end ─────────────────────────────────────────────────────────────
var nextUnlocked = false;
function endGame(crashed) {
  if (over) return;
  over = true;
  clearInterval(spawnT); clearInterval(timerT); clearInterval(flockT); clearInterval(wpmT);
  // Sao tính theo %% từ gõ đúng / tổng số từ đã xuất hiện (không theo độ cao diều)
  var pctWords = wordsTotal ? Math.round(wordsDone / wordsTotal * 100) : 0;
  var stars = crashed ? 0 : (pctWords > 90 ? 3 : pctWords > 60 ? 2 : pctWords > 30 ? 1 : 0);
  var prevBest = store.kite.best[level] || 0;
  var gained = Math.max(0, stars - prevBest) * 100;         // 100 XP per NEW star
  if (stars > prevBest) store.kite.best[level] = stars;
  if (gained) store.xp = (store.xp || 0) + gained;
  nextUnlocked = stars >= 1;
  if (nextUnlocked && level + 1 > (store.kite.level || 1)) store.kite.level = level + 1;
  saveStore(store);

  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('ovEmoji').textContent = crashed ? '🍂' : (stars > 0 ? '⭐'.repeat(stars) : '🌥️');
  document.getElementById('ovTitle').textContent = crashed ? 'Ôi, diều rơi mất rồi!' : (stars > 0 ? 'Bạn được ' + stars + ' sao!' : 'Chưa được sao nào');
  document.getElementById('ovMsg').textContent = crashed ? 'Đừng buồn, thử thả diều lại nhé!'
    : stars === 3 ? 'Tuyệt vời! Diều bay cao tít trên mây!'
    : stars > 0 ? 'Hay lắm! Thử đưa diều lên cao hơn nữa nhé!'
    : 'Gõ đúng hơn 30%% số mây để được sao nhé!';
  var mins = startedAt ? Math.max((Date.now() - startedAt) / 60000, 1 / 60) : 1;
  var acc = correctKeys + wrongKeys ? Math.round(correctKeys / (correctKeys + wrongKeys) * 100) : 100;
  document.getElementById('ovStats').innerHTML =
    '⭐ Mây đã phá: ' + wordsDone + '/' + wordsTotal + ' (' + pctWords + '%) · ⚡ ' +
    Math.round(correctKeys / 5 / mins) + ' WPM · 🎯 ' + acc + '%' +
    (gained ? '<br>✨ +' + gained + ' XP' : '');
  document.getElementById('btnNext').style.display = nextUnlocked ? '' : 'none';
  if (!crashed && stars > 0) {
    for (var i = 0; i < stars; i++) sStar(i);
    setTimeout(sFan, stars * 350);
    fireworks();
  }
}
function startLevel(l) {
  level = l;
  document.getElementById('lvl').textContent = level;
  document.getElementById('overlay').style.display = 'none';
  clouds.forEach(function (c) { c.el.remove(); });
  clouds = [];
  over = false; score = 0; timeLeft = 60; kite = 30; kiteTarget = 30;
  correctKeys = 0; wrongKeys = 0; startedAt = 0; fireCooldown = false;
  wordsDone = 0; wordsTotal = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('wpm').textContent = '0';
  document.getElementById('time').textContent = '1:00';
  layoutKite();
  clearInterval(spawnT); clearInterval(timerT); clearInterval(flockT); clearInterval(wpmT);
  spawnT = setInterval(spawnCloud, spawnGap() * 1000);
  flockT = setInterval(function () { if (Math.random() < 0.6) spawnFlock(); }, 22000);
  wpmT = setInterval(updateWPM, 1000);
  timerT = setInterval(function () {
    if (over) return;
    timeLeft--;
    document.getElementById('time').textContent = '0:' + String(Math.max(0, timeLeft)).padStart(2, '0');
    if (timeLeft <= 5 && timeLeft > 0) sTick();
    if (timeLeft <= 0) endGame(false);
  }, 1000);
  setTimeout(spawnCloud, 700);
  setTimeout(spawnFlock, 4000);
}
document.getElementById('btnRetry').addEventListener('click', function () { startLevel(level); });
document.getElementById('btnNext').addEventListener('click', function () { startLevel(level + 1); });
document.getElementById('soundBtn').addEventListener('click', function () {
  soundOn = !soundOn;
  this.textContent = soundOn ? '🔊' : '🔇';
});
window.addEventListener('resize', layoutKite);

// ── Boot ────────────────────────────────────────────────────────────────────
fetch('lessons.json').then(function (r) { return r.json(); }).then(function (d) {
  WORDS = d.game || [];
  startLevel(level);
}).catch(function () {
  document.getElementById('ovTitle').textContent = 'Không tải được từ vựng';
  document.getElementById('overlay').style.display = 'flex';
});
})();
</script>
</body>
