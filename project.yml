name: VietTelex
options:
  bundleIdPrefix: com.viettelex
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  TelexCore:
    path: TelexCore

schemes:
  VietTelex:
    build:
      targets:
        VietTelex: all
    test:
      targets:
        - VietTelexTests

targets:
  VietTelexTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AppTests
    dependencies:
      - target: VietTelex
    settings:
      base:
        # Hosted tests: @testable import VietTelex needs the app module loaded.
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/VietTelex.app/Contents/MacOS/VietTelex
        BUNDLE_LOADER: $(TEST_HOST)
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: "YES"

  VietTelex:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources/Assets.xcassets
        buildPhase: resources
      - path: App/Resources/MenuIcon.pdf
        buildPhase: resources
      - path: App/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: App/Resources/en.lproj
        buildPhase: resources
      - path: App/Resources/vi.lproj
        buildPhase: resources
    dependencies:
      - package: TelexCore
        product: TelexCore
      - sdk: InputMethodKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viettelex.inputmethod.telex
        PRODUCT_NAME: VietTelex
        PRODUCT_MODULE_NAME: VietTelex
        INFOPLIST_FILE: App/Resources/Info.plist
        # App icon comes from Assets.xcassets (compiled to Assets.car by actool),
        # not a raw .icns — smaller bundle. See Scripts/make_appicon.py.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_OPTIMIZATION: space
        # xcodebuild ad-hoc signs; Scripts/notarize-install.sh re-signs with
        # Developer ID + hardened runtime, then notarizes + staples. macOS 26
        # requires input methods to be NOTARIZED to register — verified with a
        # notarized third-party input method as control (registered) vs our
        # unnotarized builds (never
        # did). Uses VietTelex.entitlements (sandbox off, NO get-task-allow —
        # get-task-allow is rejected by notarization).
        CODE_SIGN_ENTITLEMENTS: App/Resources/VietTelex.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: "YES"
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        # App uses Swift 5 language mode (AppKit/IMK main-thread singletons).
        # TelexCore remains Swift 6 strict-concurrency clean.
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: "YES"
