name: VietTelex-iOS
options:
  bundleIdPrefix: com.viettelex
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  TelexCore:
    path: ../TelexCore
settings:
  base:
    DEVELOPMENT_TEAM: 84T567KMYD
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-Osize"
      LLVM_LTO: YES_THIN
      DEPLOYMENT_POSTPROCESSING: YES
      STRIP_INSTALLED_PRODUCT: YES
targets:
  VietTelexApp:
    type: application
    platform: iOS
    sources: [App]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viettelex.ios
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: VietTelex
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - target: VietTelexKeyboard
        embed: true
  VietTelexKeyboard:
    type: app-extension
    platform: iOS
    sources: [Keyboard]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.viettelex.ios.keyboard
        CODE_SIGN_ENTITLEMENTS: Keyboard/Keyboard.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Tiếng Việt (VietTelex)"
    info:
      path: Keyboard/Info.plist
      properties:
        CFBundleDisplayName: "Tiếng Việt (VietTelex)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: vi
            RequestsOpenAccess: false
    dependencies:
      - package: TelexCore
  VietTelexKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    sources: [KeyboardTests, Keyboard/EngineBridge.swift]
    dependencies:
      - package: TelexCore
